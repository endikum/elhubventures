<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>New Lead Notification</title>
</head>
<body style="margin: 0; padding: 20px; background-color: #000000; font-family: Arial, sans-serif;">
<div style="max-width: 600px; margin: 0 auto; background-color: #050505; color: #ffffff; padding: 40px; border-radius: 8px; border: 1px solid #1a1c23;">
  <div style="text-align: center; margin-bottom: 30px;">
    <h1 style="margin: 0; color: #d4af37; font-size: 24px; letter-spacing: 2px;">EL-HUB <span style="font-weight: 300; color: #ffffff;">VENTURES</span></h1>
    <p style="color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;">New Lead Notification</p>
  </div>
  <div style="background-color: #0d0f14; padding: 25px; border-radius: 6px; border-left: 4px solid #d4af37;">
    <p style="margin: 0 0 15px 0; font-size: 14px;"><strong style="color: #888;">Name:</strong> <br/><span style="font-size: 16px;">{{name}}</span></p>
    <p style="margin: 0 0 15px 0; font-size: 14px;"><strong style="color: #888;">Email:</strong> <br/><a href="mailto:{{email}}" style="color: #e3c567; text-decoration: none; font-size: 16px;">{{email}}</a></p>
    <p style="margin: 0 0 15px 0; font-size: 14px;"><strong style="color: #888;">Service Needed:</strong> <br/><span style="font-size: 16px;">{{service}}</span></p>
    <p style="margin: 0 0 5px 0; font-size: 14px;"><strong style="color: #888;">Project Details:</strong></p>
    <div style="background-color: #1a1c23; padding: 15px; border-radius: 4px; font-size: 14px; line-height: 1.6; white-space: pre-wrap;">{{message}}</div>
  </div>
  <div style="text-align: center; margin-top: 30px;">
    <a href="mailto:{{email}}" style="display: inline-block; background-color: #d4af37; color: #000; text-decoration: none; padding: 12px 25px; font-weight: bold; border-radius: 4px; font-size: 14px;">Reply to Lead</a>
  </div>
</div>
</body>
</html>
